<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TC YOUTUBE SİMİLATÖR:AÇILIŞA ÖZEL</title>
    <style>
        :root { --yt-red: #ff0000; --terminal-green: #00ff00; --bg: #050505; --card: #121212; --gold: #ffcc00; }
        body { font-family: 'Consolas', monospace; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        #console-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60%; 
            background: rgba(0, 0, 0, 0.98); border-bottom: 2px solid var(--terminal-green); 
            z-index: 9999; display: none; padding: 20px; box-sizing: border-box;
        }
        #console-output { height: 90%; overflow-y: auto; font-size: 14px; color: var(--terminal-green); }
        #console-input { width: 100%; background: transparent; border: none; border-left: 10px solid var(--terminal-green); color: white; font-size: 16px; outline: none; padding-left: 10px; }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: #0a0a0a; padding: 15px; border-bottom: 1px solid #222; text-align: center; }
        .stat-val { color: var(--yt-red); font-weight: bold; font-size: 22px; }

        .wrapper { display: grid; grid-template-columns: 320px 1fr 280px; height: calc(100vh - 80px); }
        
        .market-side { background: #0d0d0d; padding: 15px; overflow-y: auto; border-right: 1px solid #222; }
        .shop-card { background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #333; position: relative; }
        .shop-card h4 { margin: 0; color: #3ea6ff; font-size: 13px; text-transform: uppercase; width: 75%; }
        .shop-card .lvl { position: absolute; top: 15px; right: 15px; color: var(--gold); font-size: 11px; }
        .shop-card button { width: 100%; margin-top: 10px; padding: 10px; background: var(--yt-red); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .shop-card button:disabled { background: #222; color: #555; }

        .main-zone { padding: 40px; text-align: center; background: radial-gradient(circle at center, #111 0%, #050505 100%); }
        .video-btn { width: 200px; height: 200px; border-radius: 50%; border: none; background: var(--yt-red); color: white; cursor: pointer; font-size: 22px; font-weight: bold; box-shadow: 0 0 40px rgba(255, 0, 0, 0.3); transition: 0.1s; }
        .video-btn:active { transform: scale(0.95); }

        .player-list { background: #0d0d0d; padding: 15px; border-left: 1px solid #222; }
        .player-box { padding: 10px; border-bottom: 1px solid #222; font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: bold; border: 1px solid; }

        #login { position: fixed; inset: 0; background: #000; z-index: 8888; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #login input { padding: 12px; width: 250px; background: #111; border: 1px solid #333; color: white; border-radius: 5px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

    <div id="login">
        <h2 style="letter-spacing: 8px; color: var(--yt-red);">LANSMAN_MODU</h2>
        <input type="text" id="user-in" placeholder="KURUCU_ADI" autocomplete="off">
        <button onclick="boot()" style="padding:12px 40px; cursor:pointer; background:var(--yt-red); color:white; border:none; font-weight:bold; border-radius: 5px;">SİSTEMİ BAŞLAT</button>
    </div>

    <div id="console-overlay">
        <div id="console-output"><div>--- LANSMAN ÖZEL SİSTEM v12.0 ---</div><div style="color:gold">>> AKTİF: 3 GÜNLÜK ÜCRETSİZ YÜKSELTMELER!</div></div>
        <input type="text" id="console-input" placeholder="root@sistem:~#" autocomplete="off">
    </div>

    <div class="stats-bar">
        <div>ABONE <br><span id="s-abone" class="stat-val">0</span></div>
        <div>BAKİYE <br><span id="s-para" class="stat-val">0 ₺</span></div>
        <div>İZLENME <br><span id="s-izlenme" class="stat-val">0</span></div>
        <div>GELİR/SN <br><span id="s-income" class="stat-val" style="color:var(--terminal-green)">0</span></div>
    </div>

    <div class="wrapper">
        <div class="market-side">
            <h3 style="font-size:11px; color:#555; border-bottom:1px solid #333; padding-bottom:5px; margin-top:0;">BEDAVA_MARKET (3 GÜN)</h3>
            <div id="shop-list"></div>
        </div>
        
        <div class="main-zone">
            <h1 id="brand-name" style="margin-top:0; color: #444;">BEKLEMEDE</h1>
            <button class="video-btn" onclick="upload()">VİDEO YÜKLE</button>
            <div id="notif" style="margin-top:30px; color:var(--gold); font-weight:bold; font-size:18px;"></div>
        </div>

        <div class="player-list">
            <h3 style="font-size:11px; color:#555; border-bottom:1px solid #333; padding-bottom:5px; margin-top:0;">NETWORK_NODES</h3>
            <div id="node-list"></div>
        </div>
    </div>

    <script>
        let state = { a: 0, p: 0, i: 0, income: 0, mult: 1, name: "", players: [] };
        
        // --- KAMPANYA AYARLARI ---
        const IS_FREE_EVENT = true; // Yükseltmeler 0 TL mi?
        const START_BONUS = 100000; // Yeni gelenlere verilecek para

        const items = [
            { id: 0, f: 50, g: 15, lvl: 0, names: ["Eski Klavye", "Ofis Klavyesi", "Işıklı Klavye", "Mekanik Klavye", "Özel Yapım Mekanik"] },
            { id: 1, f: 200, g: 60, lvl: 0, names: ["Dahili Mikrofon", "Yaka Mikrofonu", "USB Mikrofon", "Stüdyo Mikrofonu", "Shure SM7B"] },
            { id: 2, f: 800, g: 200, lvl: 0, names: ["720p Kamera", "1080p Web Cam", "Aynasız Kamera", "4K Sinema Kamerası", "8K RED V-Raptor"] },
            { id: 3, f: 3000, g: 800, lvl: 0, names: ["Eski Laptop", "Toplama PC", "Oyun Bilgisayarı", "Render Canavarı", "Süper Bilgisayar"] },
            { id: 4, f: 12000, g: 3000, lvl: 0, names: ["Stajyer Editör", "Freelance Editör", "Tam Zamanlı Editör", "Kurgu Ekibi", "Prodüksiyon Şirketi"] }
        ];

        function boot() {
            let n = document.getElementById('user-in').value;
            if(n.length < 2) return;
            state.name = n;
            document.getElementById('login').style.display = 'none';
            document.getElementById('brand-name').innerText = n.toUpperCase();
            
            // Kurucu olarak sen de bonusla başla
            state.p = START_BONUS;
            state.players.push({n: n, r: "KURUCU", cash: START_BONUS});
            
            render();
            update();
        }

        function upload() {
            let bonus = (150 + (state.income * 2)) * state.mult;
            state.i += bonus;
            state.a += Math.floor(bonus / 10);
            state.p += Math.floor(bonus / 3);
            update();
        }

        function update() {
            document.getElementById('s-abone').innerText = Math.floor(state.a).toLocaleString();
            document.getElementById('s-para').innerText = Math.floor(state.p).toLocaleString() + " ₺";
            document.getElementById('s-izlenme').innerText = Math.floor(state.i).toLocaleString();
            document.getElementById('s-income').innerText = (state.income * state.mult).toLocaleString();
            
            items.forEach((item, i) => {
                let b = document.getElementById('btn-'+i);
                let title = document.getElementById('title-'+i);
                if(b) {
                    // KAMPANYA: 0 TL kontrolü
                    let cost = IS_FREE_EVENT ? 0 : Math.floor(item.f * Math.pow(0.90, item.lvl));
                    b.innerText = item.lvl >= 20 ? "MAKS. SEVİYE" : (IS_FREE_EVENT ? "BEDAVA YÜKSELT" : cost + " ₺ YÜKSELT");
                    b.disabled = state.p < cost || item.lvl >= 20;
                    
                    let nameIdx = Math.min(Math.floor(item.lvl / 4), item.names.length - 1);
                    title.innerText = item.names[nameIdx];
                }
            });
        }

        function render() {
            const sl = document.getElementById('shop-list');
            sl.innerHTML = "";
            items.forEach((item, i) => {
                sl.innerHTML += `<div class="shop-card">
                    <span class="lvl" id="lvl-${i}">SEV ${item.lvl}/20</span>
                    <h4 id="title-${i}">${item.names[0]}</h4>
                    <small>Gelir: +${item.g}/sn</small>
                    <button id="btn-${i}" onclick="buy(${i})">YÜKSELT</button>
                </div>`;
            });
            renderNodes();
        }

        function renderNodes() {
            const nl = document.getElementById('node-list');
            nl.innerHTML = "";
            state.players.forEach(p => {
                let color = p.r == 'KURUCU' ? 'var(--gold)' : (p.r == 'ADMİN' ? 'cyan' : '#888');
                nl.innerHTML += `<div class="player-box">
                    <span>${p.n} <small style="color:#555">(${p.cash.toLocaleString()}₺)</small></span>
                    <span class="badge" style="color:${color}; border-color:${color}">${p.r}</span>
                </div>`;
            });
        }

        function buy(i) {
            let item = items[i];
            let cost = IS_FREE_EVENT ? 0 : Math.floor(item.f * Math.pow(0.90, item.lvl));
            if(state.p >= cost && item.lvl < 20) {
                state.p -= cost;
                state.income += item.g + (item.lvl * 15); 
                item.lvl++;
                document.getElementById('lvl-'+i).innerText = `SEV ${item.lvl}/20`;
                update();
            }
        }

        const con = document.getElementById('console-overlay');
        const cin = document.getElementById('console-input');
        const cout = document.getElementById('console-output');

        window.addEventListener('keydown', (e) => {
            if(e.key === "F2") {
                e.preventDefault();
                con.style.display = con.style.display === "block" ? "none" : "block";
                if(con.style.display === "block") cin.focus();
            }
        });

        cin.addEventListener('keypress', (e) => {
            if(e.key === "Enter") {
                let val = cin.value.trim();
                if(val) exec(val);
                cin.value = "";
            }
        });

        function log(m, c = "var(--terminal-green)") {
            let d = document.createElement('div');
            d.style.color = c;
            d.innerText = ">> " + m;
            cout.appendChild(d);
            cout.scrollTop = cout.scrollHeight;
        }

        function exec(cmd) {
            let p = cmd.split(" ");
            let m = p[0].toLowerCase();
            switch(m) {
                case "cmds":
                    log("--- LANSMAN YETKİLERİ ---");
                    log("para [miktar] | hiz [çarpan] | ekle [isim]");
                    log("duyuru [mesaj] | temizle");
                    break;
                case "para": state.p = parseInt(p[1]) || 0; log("Nakit güncellendi."); break;
                case "hiz": state.mult = parseInt(p[1]) || 1; log("Hız ok."); break;
                case "ekle": 
                    let nName = p.slice(1).join("_");
                    state.players.push({n: nName, r: "OYUNCU", cash: START_BONUS}); 
                    log(nName + " 100K bonusla eklendi.");
                    renderNodes(); break;
                case "duyuru": 
                    let nbox = document.getElementById('notif');
                    nbox.innerText = "📢 " + p.slice(1).join(" ").toUpperCase();
                    setTimeout(() => nbox.innerText = "", 5000);
                    break;
                case "temizle": cout.innerHTML = ""; break;
                default: log("HATA: GEÇERSİZ", "red");
            }
            update();
        }

        setInterval(() => {
            state.p += state.income * state.mult;
            state.i += (state.income * 2) * state.mult;
            update();
        }, 1000);
    </script>
</body>
</html>
